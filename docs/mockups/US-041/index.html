<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuova partita rapida — Step 1</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="page">

    <!-- Header -->
    <div class="page-header">
      <a href="#" class="back-btn">←</a>
      <div>
        <div class="page-title">Nuova partita</div>
        <div class="page-subtitle">Registrazione rapida</div>
      </div>
    </div>

    <!-- Stepper -->
    <div class="stepper">
      <div class="step active">
        <div class="step-dot">1</div>
        <div class="step-label">Sport</div>
      </div>
      <div class="step">
        <div class="step-dot">2</div>
        <div class="step-label">Giocatori</div>
      </div>
      <div class="step">
        <div class="step-dot">3</div>
        <div class="step-label">Risultato</div>
      </div>
      <div class="step">
        <div class="step-dot">4</div>
        <div class="step-label">Gruppo</div>
      </div>
    </div>

    <!-- Sport selection -->
    <div class="section-label">Che sport avete giocato?</div>
    <div class="sport-grid">
      <a href="players.html" class="sport-card selected">
        <div class="sport-icon">🎾</div>
        <div class="sport-name">Padel</div>
        <div class="sport-detail">2 vs 2</div>
      </a>
      <a href="players.html" class="sport-card">
        <div class="sport-icon">🏖️</div>
        <div class="sport-name">Beach Tennis</div>
        <div class="sport-detail">2 vs 2</div>
      </a>
      <a href="players.html" class="sport-card">
        <div class="sport-icon">🏀</div>
        <div class="sport-name">Basket</div>
        <div class="sport-detail">2 vs 2</div>
      </a>
      <a href="players.html" class="sport-card">
        <div class="sport-icon">🃏</div>
        <div class="sport-name">Burraco</div>
        <div class="sport-detail">2 vs 2</div>
      </a>
    </div>

    <!-- CTA -->
    <a href="players.html" class="submit-btn">Avanti →</a>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="#" class="nav-item active">
      <span class="nav-icon">➕</span>
      <span>Partita</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">⚽</span>
      <span>Circoli</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>Profilo</span>
    </a>
  </nav>
</body>
</html>
