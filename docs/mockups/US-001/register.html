<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLP — Registrati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* Password strength bar */
    .pw-strength {
      height: 3px;
      border-radius: var(--r-full);
      background: var(--color-border);
      margin-top: 6px;
      overflow: hidden;
    }
    .pw-strength-fill {
      height: 100%;
      border-radius: var(--r-full);
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-weak   .pw-strength-fill { width: 33%; background: var(--color-error); }
    .strength-medium .pw-strength-fill { width: 66%; background: #F59E0B; }
    .strength-strong .pw-strength-fill { width: 100%; background: var(--color-success); }

    .pw-strength-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-placeholder);
      margin-top: 4px;
    }
    .strength-weak   .pw-strength-label { color: var(--color-error); }
    .strength-medium .pw-strength-label { color: #F59E0B; }
    .strength-strong .pw-strength-label { color: var(--color-success); }
  </style>
</head>
<body>

<div class="page">

  <!-- Background decoration -->
  <div class="bg-deco" aria-hidden="true">1000</div>

  <!-- Header -->
  <header class="auth-header">
    <a href="index.html" class="back-nav">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 13L7 9l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Accedi
    </a>
    <span class="brand">GOLP</span>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <h1 class="auth-title">Crea account.</h1>
    <p class="auth-subtitle">Inizia con rating 1000. Il resto lo decidono le partite.</p>

    <form class="auth-form" onsubmit="return false">

      <!-- Duplicate email error (hidden by default) -->
      <div class="form-error" id="email-error" style="display:none; align-items:center; gap:8px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#FF4444" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 10.5v.5" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Email già registrata. <a href="index.html" style="color:var(--color-accent);text-decoration:none;font-weight:500">Accedi?</a>
      </div>

      <div class="field">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Marco Rossi" autocomplete="name">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="marco@esempio.it" autocomplete="email">
      </div>

      <div class="field" id="pw-field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Minimo 8 caratteri"
          autocomplete="new-password"
          oninput="checkStrength(this.value)"
        >
        <div class="pw-strength">
          <div class="pw-strength-fill" id="strength-fill"></div>
        </div>
        <p class="pw-strength-label" id="strength-label">Almeno 8 caratteri</p>
      </div>

      <button type="submit" class="btn-primary" onclick="simulateSubmit()">Registrati</button>

    </form>

    <p class="auth-footer">
      Hai già un account? <a href="index.html">Accedi</a>
    </p>
  </main>

</div>

<script>
  function checkStrength(val) {
    const field = document.getElementById('pw-field');
    const label = document.getElementById('strength-label');
    field.classList.remove('strength-weak', 'strength-medium', 'strength-strong');
    if (val.length === 0) {
      label.textContent = 'Almeno 8 caratteri';
      return;
    }
    if (val.length < 8) {
      field.classList.add('strength-weak');
      label.textContent = 'Troppo corta';
    } else if (val.length < 12) {
      field.classList.add('strength-medium');
      label.textContent = 'Accettabile';
    } else {
      field.classList.add('strength-strong');
      label.textContent = 'Ottima';
    }
  }

  // Demo: simulate duplicate email error
  let clicked = false;
  function simulateSubmit() {
    clicked = !clicked;
    const err = document.getElementById('email-error');
    const emailInput = document.getElementById('email');
    err.style.display = clicked ? 'flex' : 'none';
    emailInput.classList.toggle('error', clicked);
  }
</script>

</body>
</html>
