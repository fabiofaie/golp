<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLP — Accedi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* State toggles for demo */
    .state-error   .form-error  { display: flex; }
    .state-normal  .form-error  { display: none; }
  </style>
</head>
<body>

<div class="page state-normal" id="page">

  <!-- Background decoration: the starting rating -->
  <div class="bg-deco" aria-hidden="true">1000</div>

  <!-- Header -->
  <header class="auth-header">
    <span class="brand">GOLP</span>
    <span style="font-size:11px;color:var(--color-text-placeholder);letter-spacing:0.5px;text-transform:uppercase;">Accedi</span>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <h1 class="auth-title">Bentornato.</h1>
    <p class="auth-subtitle">Accedi per vedere la tua posizione.</p>

    <form class="auth-form" onsubmit="return false">

      <!-- Error state (visible when class="state-error") -->
      <div class="form-error" style="display:none; align-items:center; gap:8px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="#FF4444" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 10.5v.5" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Credenziali non valide
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="marco@esempio.it" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <a href="forgot-password.html" class="forgot-link">Password dimenticata?</a>

      <button type="submit" class="btn-primary" onclick="toggleError()">Accedi</button>

    </form>

    <p class="auth-footer">
      Non hai un account? <a href="register.html">Registrati</a>
    </p>
  </main>

</div>

<script>
  // Demo: toggle error state to preview error UI
  let errored = false;
  function toggleError() {
    errored = !errored;
    document.getElementById('page').className = errored ? 'page state-error' : 'page state-normal';
    document.querySelector('.form-error').style.display = errored ? 'flex' : 'none';
    if (errored) {
      document.getElementById('email').classList.add('error');
      document.getElementById('password').classList.add('error');
    } else {
      document.getElementById('email').classList.remove('error');
      document.getElementById('password').classList.remove('error');
    }
  }
</script>

</body>
</html>
