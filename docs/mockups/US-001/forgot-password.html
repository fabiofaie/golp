<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLP — Recupera accesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .success-card {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--sp-5);
      padding: var(--sp-8) var(--sp-6);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--r-lg);
      margin-top: var(--sp-4);
    }
    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--r-full);
      background: rgba(34,197,94,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-card h2 {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
    }
    .success-card p {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    .success-card .email-highlight {
      color: var(--color-accent);
      font-weight: var(--font-weight-med);
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Background decoration -->
  <div class="bg-deco" aria-hidden="true">1000</div>

  <!-- Header -->
  <header class="auth-header">
    <a href="index.html" class="back-nav">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 13L7 9l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Accedi
    </a>
    <span class="brand">GOLP</span>
  </header>

  <!-- Main — form state -->
  <main class="auth-main" id="form-state">
    <h1 class="auth-title">Recupera accesso.</h1>
    <p class="auth-subtitle">Inserisci l'email del tuo account. Ti mandiamo un link.</p>

    <form class="auth-form" onsubmit="return false">

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="marco@esempio.it" autocomplete="email">
      </div>

      <button type="submit" class="btn-primary" onclick="showSuccess()">Invia link di recupero</button>

    </form>

    <p class="auth-footer">
      Ricordi la password? <a href="index.html">Accedi</a>
    </p>
  </main>

  <!-- Main — success state (shown after submit) -->
  <main class="auth-main" id="success-state" style="display:none">
    <div style="flex:1"></div>
    <div class="success-card" style="display:flex">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M7 14l5 5 9-9" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>Link inviato</h2>
      <p>
        Abbiamo inviato un link a<br>
        <span class="email-highlight" id="sent-email">marco@esempio.it</span><br><br>
        Il link scade tra 1 ora. Controlla anche la cartella spam.
      </p>
    </div>
    <a href="index.html" class="btn-ghost" style="margin-top:var(--sp-6)">Torna al login</a>
  </main>

</div>

<script>
  function showSuccess() {
    const email = document.getElementById('email').value || 'marco@esempio.it';
    document.getElementById('sent-email').textContent = email;
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('success-state').style.display = 'flex';
    document.getElementById('success-state').style.flexDirection = 'column';
  }
</script>

</body>
</html>
