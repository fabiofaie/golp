<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US-066 — Selettore circolo attivo</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="demo-strip">
    <button class="active" onclick="location.href='index.html'">Pochi circoli (3)</button>
    <button onclick="location.href='many-circles.html'">Molti circoli (8, ricerca+preferiti)</button>
  </div>

  <div class="page" style="padding-top: 40px;">
    <header class="app-header">
      <span class="brand">GOLP</span>
      <button class="logout-btn">Esci</button>
    </header>

    <main class="dashboard-content">
      <button class="circle-picker open" id="picker-btn" onclick="toggleSheet()">
        <span class="sport-icon">P</span>
        <span><small>Circolo attivo</small><strong>Padel Amici</strong></span>
        <span class="chevron">⌄</span>
      </button>

      <section>
        <div class="section-title-row">
          <h2>Il tuo momento</h2>
          <a href="#">Classifica →</a>
        </div>
        <article class="rating-card">
          <div class="rating-main">
            <div><small>RATING</small><strong>1284</strong></div>
            <div class="rank"><small>POSIZIONE</small><strong>#2</strong><span>su 12</span></div>
          </div>
          <div class="stats">
            <div><strong>24</strong><span>Partite</span></div>
            <div><strong>4</strong><span>Serie positiva</span></div>
          </div>
        </article>
      </section>
    </main>

    <!-- Overlay + Bottom sheet: aperto di default per mostrare il pattern -->
    <div class="sheet-overlay visible" id="overlay" onclick="toggleSheet()"></div>
    <div class="circle-sheet visible" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>Circolo attivo</h2>
      </div>

      <div class="sheet-list">
        <button class="circle-row" onclick="selectRow(this)">
          <span class="sport-swatch all-swatch">∀</span>
          <span class="row-info">
            <span class="row-name">Tutti i circoli</span>
            <span class="row-meta">Vista aggregata su tutti i tuoi circoli</span>
          </span>
        </button>

        <div class="sheet-group-label">I tuoi circoli</div>

        <button class="circle-row selected" onclick="selectRow(this)">
          <span class="sport-swatch" style="background: rgba(255,85,0,0.12); color: var(--color-team1);">P</span>
          <span class="row-info">
            <span class="row-name">Padel Amici</span>
            <span class="row-meta">Padel · 12 membri</span>
          </span>
          <span class="row-rating"><strong>1284</strong><span>#2</span></span>
          <span class="check-badge">✓</span>
        </button>

        <button class="circle-row" onclick="selectRow(this)">
          <span class="sport-swatch" style="background: rgba(14,165,233,0.12); color: var(--color-team2);">BT</span>
          <span class="row-info">
            <span class="row-name">Beach Tennis Estate</span>
            <span class="row-meta">Beach Tennis · 8 membri</span>
          </span>
          <span class="row-rating"><strong>1050</strong><span>#5</span></span>
        </button>

        <button class="circle-row" onclick="selectRow(this)">
          <span class="sport-swatch" style="background: rgba(34,197,94,0.12); color: var(--color-success);">B</span>
          <span class="row-info">
            <span class="row-name">Basket Ufficio</span>
            <span class="row-meta">Basket 2v2 · 6 membri</span>
          </span>
          <span class="row-rating"><strong>980</strong><span>#4</span></span>
        </button>
      </div>

      <div class="sheet-hint">Con più di 5-6 circoli compaiono ricerca e preferiti</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
