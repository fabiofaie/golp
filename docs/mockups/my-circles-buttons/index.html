<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<title>GOLP — I miei circoli (pulsanti)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="page">
    <h1 class="page-title">I miei circoli.</h1>
    <p class="page-subtitle">I circoli di cui fai parte.</p>

    <div class="circle-card">
      <div class="circle-card-header">
        <span class="sport-badge">PADEL</span>
        <span class="circle-members">22 membri</span>
      </div>

      <h2 class="circle-name">Padel Club Roma</h2>

      <div class="circle-rating-row">
        <div class="rating-group">
          <span class="rating-label">Rating</span>
          <span class="rating-value">1066</span>
        </div>
        <div class="ranking-group">
          <span class="rating-label">Posizione</span>
          <span class="ranking-value">1<span class="ranking-total"> / 22</span></span>
        </div>
      </div>

      <!-- Azioni membro: navigazione (peso uguale) + 1 azione primaria -->
      <div class="action-section">
        <span class="section-label">Le tue azioni</span>
        <div class="action-row">
          <a href="#" class="btn btn-nav" aria-label="Vai alla classifica">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg>
            Classifica
          </a>
          <a href="#" class="btn btn-nav" aria-label="Vai allo storico partite">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
            Partite
          </a>
          <a href="#" class="btn btn-primary" aria-label="Registra una nuova partita">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Registra
          </a>
        </div>
        <div class="action-row">
          <a href="#" class="btn btn-nav" aria-label="Vai ai premi">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a6 6 0 100-12 6 6 0 000 12z"/><path d="M8.5 14L7 22l5-3 5 3-1.5-8"/></svg>
            Premi
          </a>
          <a href="#" class="btn btn-nav" aria-label="Vai alle statistiche personali">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 20h18M6 16v-5M12 16V8M18 16v-9"/></svg>
            Stats
          </a>
        </div>
      </div>

      <!-- Azioni owner: separate visivamente, bordo tratteggiato accent -->
      <div class="action-section">
        <div class="owner-divider"><span>Solo proprietario</span></div>
        <div class="action-row">
          <button type="button" class="btn btn-owner" aria-label="Invita un nuovo membro">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Invita
          </button>
          <button type="button" class="btn btn-owner" aria-label="Aggiungi giocatore manualmente">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
            Giocatore
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
