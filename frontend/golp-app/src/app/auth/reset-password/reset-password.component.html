<div class="page">
  <div class="bg-deco" aria-hidden="true">1000</div>

  <header class="auth-header">
    <a routerLink="/login" class="back-nav">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Indietro
    </a>
    <span class="brand">GOLP</span>
  </header>

  <main class="auth-main">
    <h1 class="auth-title">Nuova password.</h1>
    <p class="auth-subtitle">Scegli una password di almeno 8 caratteri.</p>

    @if (success) {
      <div class="form-success">
        Password aggiornata. Reindirizzamento al login…
      </div>
    } @else {
      @if (errorMessage) {
        <div class="form-error">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#FF4444" stroke-width="1.5"/>
            <path d="M8 5v3.5M8 10.5v.5" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          {{ errorMessage }}
        </div>
      }

      <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="newPassword">Nuova password</label>
          <input id="newPassword" type="password" formControlName="newPassword"
                 placeholder="••••••••" autocomplete="new-password">
          <span class="field-hint">Almeno 8 caratteri</span>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading || !token">
          {{ loading ? 'Salvataggio…' : 'Salva password' }}
        </button>
      </form>
    }
  </main>
</div>
