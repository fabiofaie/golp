<div class="page">
  <div class="bg-deco" aria-hidden="true">1000</div>

  <header class="auth-header">
    <a routerLink="/login" class="back-nav">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Indietro
    </a>
    <span class="brand">GOLP</span>
  </header>

  <main class="auth-main">
    <h1 class="auth-title">Reset password.</h1>
    <p class="auth-subtitle">Inserisci la tua email per ricevere il link.</p>

    @if (submitted) {
      <div class="form-success">
        Se l'email è registrata, riceverai un link a breve.
      </div>
      <p class="auth-footer" style="margin-top: 24px">
        <a routerLink="/login">Torna al login</a>
      </p>
    } @else {
      <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" placeholder="marco@esempio.it" autocomplete="email">
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Invio…' : 'Invia link' }}
        </button>
      </form>
    }
  </main>
</div>
